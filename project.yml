name: Kefir
options:
  bundleIdPrefix: com.malyshev
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.6"
    CURRENT_PROJECT_VERSION: "7"
    ENABLE_PREVIEWS: YES

targets:
  Kefir:
    type: application
    platform: iOS
    sources:
      - path: Kefir
        excludes:
          - "Resources/**"
          - "Assets.xcassets"
      - path: Kefir/Assets.xcassets
        buildPhase: resources
      - path: Kefir/Resources/english_vocab.json
        buildPhase: resources
      - path: Kefir/Resources/ipa_en.json
        buildPhase: resources
      - path: Kefir/Resources/synonyms_en.json
        buildPhase: resources
    info:
      path: Kefir/Info.plist
      properties:
        CFBundleDisplayName: MyDict
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSSpeechRecognitionUsageDescription: "Для озвучки карточек"
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Kefir/Kefir.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.malyshev.kefir
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)com.malyshev.kefir"
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.malyshev.kefir
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
